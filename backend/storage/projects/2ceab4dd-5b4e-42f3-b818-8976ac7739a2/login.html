<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login - Quiz App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- VIBRANT THEME VARIABLES --- */
        :root {
            --page-bg: #f3e5f5;
            --card-gradient-1: #8e2de2;
            --card-gradient-2: #4a00e0;
            --input-bg: #ffffff;
            --text-on-card: #ffffff;
            --accent-yellow: #ffdf40;
            --accent-orange: #ff8359;
            --shadow-color: rgba(74, 0, 224, 0.25);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
        }

        body {
            background-color: var(--page-bg);
            /* Soft Abstract Background Shapes */
            background-image:
                radial-gradient(circle at 10% 20%, rgba(142, 45, 226, 0.1) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(74, 0, 224, 0.1) 0%, transparent 20%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 420px;
        }

        /* --- THE VIBRANT CARD --- */
        .auth-card {
            /* The card itself is the color source */
            background: linear-gradient(135deg, var(--card-gradient-1), var(--card-gradient-2));
            color: var(--text-on-card);
            padding: 50px 40px;
            border-radius: 30px;
            /* Deep, colored shadow */
            box-shadow: 0 20px 50px var(--shadow-color);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Decorative Circles inside the card */
        .auth-card::before {
            content: '';
            position: absolute;
            top: -50px;
            right: -50px;
            width: 150px;
            height: 150px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        .auth-card::after {
            content: '';
            position: absolute;
            bottom: -30px;
            left: -30px;
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        /* Header */
        .header-icon {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 28px;
            color: var(--accent-yellow);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        .auth-card h1 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 35px;
            font-size: 15px;
            font-weight: 500;
        }

        /* --- CAPSULE INPUTS --- */
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: none;
            /* Hidden labels for cleaner look, icons used instead */
        }

        .input-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--card-gradient-2);
            z-index: 10;
        }

        .form-group input {
            width: 100%;
            padding: 16px 20px 16px 50px;
            /* Space for icon */
            border: none;
            border-radius: 50px;
            /* Full Capsule Shape */
            background: var(--input-bg);
            font-size: 16px;
            font-weight: 600;
            color: #333;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }

        .form-group input:focus {
            outline: none;
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        /* --- OPTIONS --- */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.9);
        }

        .form-options label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        /* Custom Checkbox */
        .form-options input[type="checkbox"] {
            accent-color: var(--accent-yellow);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .forgot-link {
            color: var(--accent-yellow);
            text-decoration: none;
            font-weight: 700;
            border-bottom: 1px dashed var(--accent-yellow);
        }

        .forgot-link:hover {
            color: #fff;
            border-bottom-style: solid;
        }

        /* --- BUTTONS --- */
        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 50px;
            border: none;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: var(--accent-yellow);
            color: var(--card-gradient-2);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
        }

        .btn-primary:hover {
            background: #fff;
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
        }

        .form-actions {
            margin-top: 15px;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            margin-top: 15px;
            font-size: 14px;
            padding: 12px;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* --- FOOTER --- */
        .admin-link-box {
            margin-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 20px;
        }

        .admin-link {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 0.9em;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: color 0.3s;
        }

        .admin-link:hover {
            color: white;
        }

        .back-home {
            margin-top: 25px;
            text-align: center;
        }

        .back-home a {
            color: var(--card-gradient-2);
            font-weight: 700;
            text-decoration: none;
            opacity: 0.8;
        }

        .back-home a:hover {
            opacity: 1;
        }

        .message.hidden {
            display: none;
        }

        .message {
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <div class="container">

        <div class="auth-card">

            <div class="header-icon">
                <i class="fas fa-rocket"></i>
            </div>

            <h1>Welcome Back</h1>
            <p class="subtitle">Ready to continue your quiz journey?</p>

            <form id="loginForm">
                <div class="form-group">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" id="username" placeholder="Username or Email" required>
                </div>

                <div class="form-group">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="password" placeholder="Password" required>
                </div>

                <div class="form-options">
                    <label>
                        <input type="checkbox" id="rememberMe"> <span>Keep me logged in</span>
                    </label>
                    <a href="#" class="forgot-link">Help?</a>
                </div>

                <div id="message" class="message hidden"></div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">
                        Let's Go <i class="fas fa-arrow-right"></i>
                    </button>

                    <button type="button" class="btn btn-secondary" onclick="window.location.href='register.html'">
                        New here? Create Account
                    </button>
                </div>

                <div class="admin-link-box">
                    <a href="admin-login.html" class="admin-link">
                        <i class="fas fa-shield-alt"></i> Access Admin Dashboard
                    </a>
                </div>
            </form>
        </div>

        <div class="back-home">
            <a href="index.html">
                <i class="fas fa-chevron-left"></i> Back to Home
            </a>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/user-auth.js"></script>
</body>

</html>
