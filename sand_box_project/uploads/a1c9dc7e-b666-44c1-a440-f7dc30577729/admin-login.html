<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | Access Control</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- TECH THEME VARIABLES --- */
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --primary-accent: #06b6d4;
            /* Cyan */
            --secondary-accent: #3b82f6;
            /* Blue */
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --input-bg: #020617;
            --danger: #ef4444;
            --success: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            /* Tech Grid Background Pattern */
            background-image:
                linear-gradient(rgba(6, 182, 212, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(6, 182, 212, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Glow Behind Card */
        .glow-effect {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, rgba(15, 23, 42, 0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 10;
        }

        /* --- THE CARD --- */
        .auth-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Header Section */
        .icon-circle {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.1), rgba(59, 130, 246, 0.1));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            border: 1px solid rgba(6, 182, 212, 0.2);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.1);
        }

        .icon-circle i {
            font-size: 28px;
            color: var(--primary-accent);
        }

        .auth-card h1 {
            color: var(--text-main);
            margin-bottom: 8px;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-muted);
            margin-bottom: 35px;
            font-size: 14px;
        }

        /* --- FORM ELEMENTS --- */
        .form-group {
            margin-bottom: 20px;
            text-align: left;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #475569;
            transition: color 0.3s;
        }

        .form-group input {
            width: 100%;
            padding: 14px 14px 14px 45px;
            /* Space for icon */
            background: var(--input-bg);
            border: 1px solid #334155;
            border-radius: 8px;
            color: var(--text-main);
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-accent);
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.15);
        }

        .form-group input:focus+i {
            color: var(--primary-accent);
        }

        /* --- BUTTONS --- */
        .btn {
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--secondary-accent), var(--primary-accent));
            color: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2), 0 2px 4px -1px rgba(0, 0, 0, 0.1);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.4);
        }

        .form-actions {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid #334155;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.03);
            border-color: var(--text-muted);
            color: var(--text-main);
        }

        /* --- INFO BOX (Terminal Style) --- */
        .info-box {
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            margin-top: 30px;
            text-align: left;
            border-left: 3px solid var(--primary-accent);
            font-family: 'Courier New', monospace;
            /* Code font */
        }

        .info-box h3 {
            color: var(--text-muted);
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-box p {
            margin: 4px 0;
            color: var(--secondary-accent);
            font-size: 13px;
        }

        .info-box span {
            color: var(--text-muted);
        }

        /* --- MESSAGES --- */
        .message {
            padding: 12px;
            border-radius: 8px;
            margin: 15px 0;
            font-size: 14px;
            text-align: center;
        }

        .message.error {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .message.success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .hidden {
            display: none;
        }

        /* --- FOOTER --- */
        .back-home {
            margin-top: 25px;
            text-align: center;
        }

        .back-home a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }

        .back-home a:hover {
            color: var(--primary-accent);
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 25px;
            }
        }
    </style>
</head>

<body>

    <div class="glow-effect"></div>

    <div class="container">
        <div class="auth-card">

            <div class="icon-circle">
                <i class="fas fa-shield-halved"></i>
            </div>

            <h1>Admin Portal</h1>
            <p class="subtitle">Secure access for system administrators</p>

            <form id="adminLoginForm">
                <div class="form-group">
                    <label for="adminUsername">Administrator ID</label>
                    <div class="input-wrapper">
                        <input type="text" id="adminUsername" placeholder="Enter ID" autocomplete="off" required>
                        <i class="fas fa-user-astronaut"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="adminPassword">Access Key</label>
                    <div class="input-wrapper">
                        <input type="password" id="adminPassword" placeholder="Enter Key" required>
                        <i class="fas fa-fingerprint"></i>
                    </div>
                </div>

                <div id="adminMessage" class="message hidden"></div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" style="flex: 2;">
                        Authenticate <i class="fas fa-arrow-right"></i>
                    </button>
                    <button type="button" class="btn btn-secondary" onclick="window.location.href='login.html'"
                        style="flex: 1;">
                        User
                    </button>
                </div>
            </form>



            <div class="back-home">
                <a href="index.html">
                    <i class="fas fa-chevron-left"></i> Return to Main Dashboard
                </a>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/admin-auth.js"></script>
</body>

</html>
